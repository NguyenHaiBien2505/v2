server:
  port: 8080
  servlet:
    context-path: /api/v2

spring:
  application:
    name: be
  datasource:
    url: "jdbc:mysql://localhost:3306/kimquy_v2"
    driverClassName: "com.mysql.cj.jdbc.Driver"
